<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Archivio Traduzioni</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url("https://wallpapercave.com/wp/wp5128415.jpg") no-repeat center center fixed;
  background-size: cover;
  color: #f4f4f5;
}

.page {
  max-width: 1100px;
  margin: 40px auto;
  padding: 40px;
  background: rgba(0,0,0,0.8);
  border-radius: 20px;
}

h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

p {
  color: #d4d4d8;
  margin-bottom: 30px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 25px;
}

.card {
  background: #18181b;
  border-radius: 16px;
  overflow: hidden;
  transition: 0.3s;
  border: 1px solid #27272a;
}

.card:hover {
  transform: scale(1.04);
  border-color: #fca5a5;
}

.card img {
  width: 100%;
  aspect-ratio: 2 / 3; /* 600x900 */
  object-fit: cover;
  display: block;
  cursor: pointer;
}

.card-content {
  padding: 15px;
}

.card h2 {
  margin: 0;
  font-size: 20px;
}

.card p {
  margin-top: 8px;
  font-size: 14px;
  color: #a1a1aa;
}

/* giochi non disponibili */
.disabled {
  opacity: 0.5;
  cursor: default;
}

.disabled img {
  cursor: default;
}
</style>
</head>

<body>

<div class="page">
  <h1>Archivio Traduzioni</h1>
  <p>Raccolta personale di traduzioni e analisi testuali dai videogiochi.</p>

  <div class="grid">

    <!-- SEKiro -->
    <div class="card">
      <a href="sekiro.html">
        <img src="img/sekiro_cover.png" alt="Sekiro">
      </a>
      <div class="card-content">
        <h2>Sekiro: Shadows Die Twice</h2>
        <p>Traduzioni di oggetti, tecniche, personaggi e luoghi.</p>
      </div>
    </div>

    <!-- ALTRO -->
    <div class="card disabled">
      <img src="img/demons_souls_cover.png">
      <div class="card-content">
        <h2>Demon's Souls</h2>
        <p>In arrivo</p>
      </div>
    </div>

    <!-- ALTRO -->
    <div class="card disabled">
      <img src="img/dark_souls_cover.png">
      <div class="card-content">
        <h2>Dark Souls</h2>
        <p>In arrivo</p>
      </div>
    </div>

  </div>
</div>

</body>
</html>
