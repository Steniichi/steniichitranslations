<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>L'Archivio di Steniichi</title>
<link rel="icon" type="image/png" href="img/ember_icon.png">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url("img/home_background.png") no-repeat center center fixed;
  background-size: cover;
  color: #f4f4f5;
}

/* BRACI */
.embers {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 1;
}

.ember {
  position: absolute;
  background: radial-gradient(circle, #ffd27f 0%, #ff6a00 40%, #8a1a00 80%);
  border-radius: 50%;
  opacity: 0.7;
  animation: emberRise linear infinite;
  box-shadow:
  0 0 6px rgba(255, 120, 0, 0.8),
  0 0 12px rgba(255, 80, 0, 0.6),
  0 0 20px rgba(255, 40, 0, 0.4);
  animation: emberRise linear infinite, flicker 1.5s infinite;
}

@keyframes flicker {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

@keyframes emberRise {
  0% {
    transform: translate(0, 0);
    opacity: 0;
  }

  10% {
    opacity: 1;
  }

  25% {
    transform: translate(35px, -25vh);
  }

  50% {
    transform: translate(-25px, -50vh);
  }

  75% {
    transform: translate(45px, -75vh);
  }

  100% {
    transform: translate(-35px, -110vh);
    opacity: 0;
  }
}

.page {
  position: relative;
  z-index: 2;
  max-width: 1100px;
  margin: 40px auto;
  padding: 40px;
  background: rgba(0,0,0,0.8);
  border-radius: 20px;
}

h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

p {
  color: #d4d4d8;
  margin-bottom: 30px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 25px;
}

.card {
  background: #18181b;
  border-radius: 16px;
  overflow: hidden;
  transition: 0.3s;
  border: 1px solid #27272a;
}

.card:hover {
  transform: scale(1.04);
  border-color: #fca5a5;
}

.card img {
  width: 100%;
  aspect-ratio: 2 / 3;
  object-fit: cover;
  display: block;
  cursor: pointer;
}

.card-content {
  padding: 15px;
}

.card h2 {
  margin: 0;
  font-size: 20px;
}

.card p {
  margin-top: 8px;
  font-size: 14px;
  color: #a1a1aa;
}

.disabled {
  opacity: 0.5;
  cursor: default;
}

.disabled img {
  cursor: default;
}
</style>
</head>

<body>

<div class="embers"></div>

<div class="page">
  <h1>L'Archivio di Steniichi</h1>
  <p>Raccolta delle mie traduzioni, facile da consultare.</p>

  <div class="grid">

    <div class="card">
      <a href="sekiro.html">
        <img src="img/sekiro_cover.png" alt="Sekiro">
      </a>
      <div class="card-content">
        <h2>Sekiro: Shadows Die Twice</h2>
        <p>Tutte le mie traduzioni di Sekiro, con qualche extra.</p>
      </div>
    </div>

    <div class="card disabled">
      <img src="img/demons_souls_cover.png" alt="Demon's Souls">
      <div class="card-content">
        <h2>Demon's Souls</h2>
        <p>In arrivo</p>
      </div>
    </div>

    <div class="card disabled">
      <img src="img/dark_souls_cover.png" alt="Dark Souls">
      <div class="card-content">
        <h2>Dark Souls</h2>
        <p>In arrivo</p>
      </div>
    </div>

  </div>
</div>

<script>
const container = document.querySelector(".embers");

function creaBraci() {
  for (let i = 0; i < 80; i++) {
    const ember = document.createElement("div");
    ember.className = "ember";

    const size = 2 + Math.random() * 4;
	
	const colors = [
  "#ff6a00",
  "#ff4500",
  "#ff8c00",
  "#ff2a00"
];

	ember.style.background = `radial-gradient(circle, #ffd27f 0%, ${colors[Math.floor(Math.random()*colors.length)]} 50%, #3a0a00 90%)`;

	ember.style.borderRadius = Math.random() > 0.5 ? "50%" : "40% 60% 50% 70%";
    ember.style.width = size + "px";
    ember.style.height = size + "px";
    ember.style.left = Math.random() * 100 + "vw";
    ember.style.top = (window.innerHeight + Math.random() * 120) + "px";

    ember.style.opacity = 0.3 + Math.random() * 0.7;
    ember.style.animationDuration = (6 + Math.random() * 12) + "s";
    ember.style.animationDelay = Math.random() * 10 + "s";

    container.appendChild(ember);
  }
}

creaBraci();
</script>

</body>
</html>
